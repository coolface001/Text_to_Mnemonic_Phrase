<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>极简安全助记词生成器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #09090b;
            --card-bg: rgba(20, 20, 23, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --text-muted: #52525b;
            --accent-color: #ffffff;
            --accent-text: #000000;
            --danger-color: #ef4444;
            --font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 255, 255, 0.02) 0%, transparent 40%);
        }

        .container {
            width: 100%;
            max-width: 440px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            margin-bottom: 24px;
            text-align: center;
        }

        h1 {
            font-size: 22px;
            font-weight: 500;
            letter-spacing: -0.5px;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 300;
        }

        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 90px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 15px;
            resize: none;
            outline: none;
            transition: all 0.3s ease;
        }

        textarea:focus {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.05);
        }

        .btn-row {
            display: grid;
            grid-template-columns: 2.2fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        button {
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: var(--accent-color);
            color: var(--accent-text);
        }

        .btn-primary:hover {
            opacity: 0.92;
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger-color);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.15);
        }

        .mnemonic-group {
            margin-top: 16px;
            display: block; /* Always displayed to maintain layout integrity */
        }

        .mnemonic-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed var(--border-color);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 16px;
            font-family: inherit;
            font-size: 15px;
            line-height: 1.8;
            color: var(--text-primary);
            letter-spacing: 0.3px;
            height: 140px; /* Fixed height to prevent mobile keyboard / height jumps */
            overflow-y: auto;
            word-spacing: 6px;
            user-select: text;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .mnemonic-box.empty {
            color: var(--text-muted);
            font-size: 13px;
            font-style: italic;
            border-style: dashed;
            background: rgba(255, 255, 255, 0.01);
        }

        button:disabled {
            opacity: 0.3;
            pointer-events: none;
            cursor: not-allowed;
        }

        .security-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 24px;
            font-weight: 300;
        }

        .security-badge svg {
            width: 12px;
            height: 12px;
            fill: currentColor;
        }

        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(255, 255, 255, 0.95);
            color: #000;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

        async function sha256(str) {
            const encoder = new TextEncoder();
            const data = encoder.encode(str);
            const hashBuffer = await window.crypto.subtle.digest('SHA-256', data);
            return new Uint8Array(hashBuffer);
        }

        async function generateMnemonics(input) {
            const entropy = await sha256(input);

            const checksumBuffer = await window.crypto.subtle.digest('SHA-256', entropy);
            const checksumArray = new Uint8Array(checksumBuffer);
            const checksum = checksumArray[0];

            const bits = [];
            for (let i = 0; i < entropy.length; i++) {
                const byte = entropy[i];
                for (let b = 7; b >= 0; b--) {
                    bits.push((byte >> b) & 1);
                }
            }
            for (let b = 7; b >= 0; b--) {
                bits.push((checksum >> b) & 1);
            }

            const words = [];
            for (let i = 0; i < 24; i++) {
                let idx = 0;
                for (let b = 0; b < 11; b++) {
                    idx = (idx << 1) | bits[i * 11 + b];
                }
                words.push(BIP39_WORDS[idx]);
            }
            return words.join(' ');
        }

        const inputText = document.getElementById('inputText');
        const btnGenerate = document.getElementById('btnGenerate');
        const btnClear = document.getElementById('btnClear');
        const mnemonicText = document.getElementById('mnemonicText');
        const btnCopy = document.getElementById('btnCopy');
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toastMsg');

        let currentMnemonics = '';
        let toastTimeout;

        function showToast(msg) {
            toastMsg.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        function resetMnemonicBox() {
            currentMnemonics = '';
            mnemonicText.textContent = '等待生成助记词...';
            mnemonicText.classList.add('empty');
            btnCopy.disabled = true;
        }

        btnGenerate.addEventListener('click', async () => {
            const val = inputText.value.trim();
            if (!val) {
                showToast('请输入一些文本！');
                return;
            }

            try {
                currentMnemonics = await generateMnemonics(val);
                mnemonicText.textContent = currentMnemonics;
                mnemonicText.classList.remove('empty');
                btnCopy.disabled = false;

                // Security clear: Immediately destroy original input
                inputText.value = '';
                showToast('助记词已生成，原输入已清除！');
            } catch (err) {
                console.error(err);
                showToast('生成失败，请重试');
            }
        });

        btnClear.addEventListener('click', () => {
            inputText.value = '';
            resetMnemonicBox();
            showToast('已清除所有内容');
        });

        btnCopy.addEventListener('click', async () => {
            if (!currentMnemonics) return;

            try {
                await navigator.clipboard.writeText(currentMnemonics);
                
                // Security clear: Immediately destroy mnemonic from memory and UI
                resetMnemonicBox();
                showToast('已复制到剪切板，界面显示已销毁！');
            } catch (err) {
                showToast('复制失败，请尝试手动复制');
            }
        });
